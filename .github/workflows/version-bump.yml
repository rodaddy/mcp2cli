name: Version Bump

on:
  push:
    branches: [main]
    paths-ignore:
      - 'VERSION'
      - 'package.json'
      - 'CHANGELOG.md'
  workflow_dispatch:
    inputs:
      bump_type:
        description: 'Version bump type'
        required: false
        default: 'patch'
        type: choice
        options:
          - patch
          - minor
          - major

jobs:
  bump:
    runs-on: [self-hosted, rodaddy]
    if: "!contains(github.event.head_commit.message, '[skip ci]')"
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Bump version
        id: bump
        run: |
          current=$(cat VERSION)
          IFS='.' read -r major minor patch <<< "$current"

          bump_type="${{ github.event.inputs.bump_type || 'patch' }}"
          case "$bump_type" in
            major)
              major=$((major + 1))
              minor=0
              patch=0
              ;;
            minor)
              minor=$((minor + 1))
              patch=0
              ;;
            patch)
              patch=$((patch + 1))
              ;;
          esac

          new_version="${major}.${minor}.${patch}"
          echo "$new_version" > VERSION
          sed -i "s/\"version\": \"$current\"/\"version\": \"$new_version\"/" package.json

          echo "old_version=$current" >> "$GITHUB_OUTPUT"
          echo "new_version=$new_version" >> "$GITHUB_OUTPUT"
          echo "Bumped $current -> $new_version ($bump_type)"

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add VERSION package.json
          git commit -m "chore: bump version to $(cat VERSION) [skip ci]"
          git push
